<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Prediction | Krishi AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }

        .back-home:hover {
            transform: translateX(-5px);
        }

        .yield-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(46, 125, 50, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: var(--dark);
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: white;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .submit-btn:hover {
            background: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 125, 50, 0.4);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
    </style>
</head>

<body>
    <a href="/home" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="yield-container">
        <h2><i class="fa-solid fa-leaf"></i> Yield Analysis</h2>
        <form id="inputForm" action="/predict_yield" method="POST">
            <div class="form-group">
                <label for="landArea">Land Area (in acres)</label>
                <div class="input-icon">
                    <input type="number" id="landArea" name="landArea" step="0.1" placeholder="e.g. 5.5" required>
                    <i class="fa-solid fa-vector-square"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <div class="input-icon">
                    <select id="location" name="location" required>
                        <option value="" disabled {% if not prefilled_location %}selected{% endif %}>Select location
                        </option>
                        <option value="Delhi" {% if prefilled_location=='Delhi' %}selected{% endif %}>Delhi, India
                        </option>
                        <option value="Mumbai" {% if prefilled_location=='Mumbai' %}selected{% endif %}>Mumbai, India
                        </option>
                        <option value="Kolkata" {% if prefilled_location=='Kolkata' %}selected{% endif %}>Kolkata, India
                        </option>
                        <option value="Chennai" {% if prefilled_location=='Chennai' %}selected{% endif %}>Chennai, India
                        </option>
                        <option value="Bangalore" {% if prefilled_location=='Bangalore' %}selected{% endif %}>Bangalore,
                            India</option>
                        <option value="Hyderabad" {% if prefilled_location=='Hyderabad' %}selected{% endif %}>Hyderabad,
                            India</option>
                        {% if prefilled_location and prefilled_location not in ['Delhi', 'Mumbai', 'Kolkata', 'Chennai',
                        'Bangalore', 'Hyderabad'] %}
                        <option value="{{ prefilled_location }}" selected>{{ prefilled_location }}</option>
                        {% endif %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="cropType">Crop Type</label>
                <div class="input-icon">
                    <input type="text" id="cropType" name="cropType" placeholder="e.g. Rice, Wheat"
                        value="{{ prefilled_crop }}" required>
                    <i class="fa-solid fa-seedling"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="season">Season</label>
                <div class="input-icon">
                    <select id="season" name="season" required>
                        <option value="" disabled selected>Select season</option>
                        <option value="Kharif">Kharif</option>
                        <option value="Rabi">Rabi</option>
                        <option value="Summer">Summer</option>
                        <option value="Whole Year">Whole Year</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Soil Nutrition (N-P-K)</label>
                <div style="display: flex; gap: 10px;">
                    <div class="input-icon" style="flex: 1;">
                        <input type="number" name="nitrogen" placeholder="N" value="80">
                    </div>
                    <div class="input-icon" style="flex: 1;">
                        <input type="number" name="phosphorus" placeholder="P" value="40">
                    </div>
                    <div class="input-icon" style="flex: 1;">
                        <input type="number" name="potassium" placeholder="K" value="40">
                    </div>
                </div>
                <small style="color: var(--text-light); font-size: 0.8rem; margin-top: 5px; display: block;">Default
                    values provided for common crops.</small>
            </div>

            <div class="form-group">
                <label for="soilPH">Soil pH Level</label>
                <div class="input-icon">
                    <input type="number" id="soilPH" name="soilPH" step="0.1" min="0" max="14" placeholder="e.g. 6.5"
                        required>
                    <i class="fa-solid fa-flask"></i>
                </div>
            </div>

            <button type="submit" class="submit-btn">Predict Crop Yield</button>
        </form>
    </div>
</body>

</html>
